<!--
  Withdraw Demo - T-Video Media Demo
  Educational only. No real payment processing or wallet addresses.
  Submitting creates a fake "Pending review" record locally.
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Withdraw · T-Video Media Demo</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div id="appRoot"></div>

  <template id="pageContent">
    <h1 class="page-title">Withdraw (Demo)</h1>

    <div class="grid grid-2 mb-16">
      <div class="stat">
        <div class="label">Available demo balance</div>
        <div class="value" id="bal">$0.00</div>
        <div class="delta">Fake demo points only</div>
      </div>
      <div class="stat">
        <div class="label">Withdrawal status</div>
        <div class="value"><span class="badge badge-warning">Pending review</span></div>
        <div class="delta">Demo placeholder</div>
      </div>
    </div>

    <div class="card mb-16">
      <h3 class="mt-0">Request withdrawal (demo)</h3>
      <form id="wdForm" autocomplete="off" novalidate>
        <div class="grid grid-2">
          <div class="field">
            <label>Amount (demo)</label>
            <input class="input" id="wdAmt" type="number" min="1" step="1" placeholder="10" required />
          </div>
          <div class="field">
            <label>Payment address (demo)</label>
            <input class="input" id="wdAddr" placeholder="demo-addr-xxxxxxxx" required />
          </div>
        </div>
        <div class="field">
          <label>Withdrawal password (demo)</label>
          <input class="input" id="wdPw" type="password" placeholder="Any text - not validated" required />
        </div>
        <button class="btn btn-primary" type="submit">Submit withdrawal (Demo)</button>
      </form>
    </div>

    <div class="notice danger">
      <strong>Educational warning:</strong> Many scam platforms allow small
      early withdrawals to build trust, then later block larger withdrawals
      or demand extra deposits ("VIP fee", "tax", "verification") before
      releasing funds. If a platform ever charges you to withdraw your own
      money, that is a scam.
    </div>

    <div class="card mt-16">
      <h3 class="mt-0">Withdrawal history (demo)</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Date</th><th>Amount</th><th>Address</th><th>Status</th></tr>
          </thead>
          <tbody id="wdRows"></tbody>
        </table>
      </div>
    </div>

    <div class="disclaimer mt-16">
      Educational demo for scam-awareness research. No real money, no real
      accounts, no real rewards.
    </div>
  </template>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    UI.renderShell("Withdraw");

    const u = DEMO.user;
    document.getElementById("bal").textContent = "$" + u.balance.toFixed(2);

    function statusBadge(s) {
      const map = {
        Pending:   "badge-warning",
        Completed: "badge-success",
        Rejected:  "badge-danger",
        Frozen:    "badge-danger",
      };
      return `<span class="badge ${map[s] || "badge-muted"}">${s}</span>`;
    }

    function renderRows() {
      const tbody = document.getElementById("wdRows");
      tbody.innerHTML = "";
      DEMO.withdrawals.forEach(w => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${w.date}</td>
          <td>$${w.amount.toFixed(2)}</td>
          <td><code>${w.address}</code></td>
          <td>${statusBadge(w.status)}</td>
        `;
        tbody.appendChild(tr);
      });
    }
    renderRows();

    document.getElementById("wdForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const amt = parseFloat(document.getElementById("wdAmt").value || "0");
      const addr = document.getElementById("wdAddr").value.trim() || "demo-addr-xxxx";
      if (!amt || amt <= 0) { UI.toast("Enter a demo amount"); return; }

      // Add a fake pending record at the top
      const today = new Date().toISOString().slice(0, 10);
      DEMO.withdrawals.unshift({
        date: today,
        amount: amt,
        address: addr.slice(0, 14) + "…",
        status: "Pending",
      });
      renderRows();

      UI.openModal(
        "Withdrawal submitted (Demo)",
        `<p>Status: <span class="badge badge-warning">Pending review</span></p>
         <p>Educational note: many scam platforms allow small early
         withdrawals, then later block larger withdrawals or demand extra
         deposits before releasing funds.</p>`,
        { confirmText: "OK" }
      );
    });
  </script>
</body>
</html>
