<!--
  Transaction History - T-Video Media Demo

  Shows real transaction records from STATE.transactions (task rewards,
  package activations, withdrawals). Tabs filter by type.
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Transaction History · T-Video Media Demo</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div id="appRoot"></div>

  <template id="pageContent">
    <h1 class="page-title">Transaction History (Demo)</h1>

    <div class="tabs" id="tabs">
      <button class="tab active" data-filter="All">All</button>
      <button class="tab" data-filter="Task Reward">Task Rewards</button>
      <button class="tab" data-filter="VIP Upgrade">VIP Upgrades</button>
      <button class="tab" data-filter="Recharge">Recharge</button>
      <button class="tab" data-filter="Withdraw">Withdrawals</button>
      <button class="tab" data-filter="Referral">Referral Rewards</button>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th><th>Type</th><th>Amount</th><th>Status</th><th>Description</th>
            </tr>
          </thead>
          <tbody id="txRows"></tbody>
        </table>
      </div>
    </div>

    <div class="disclaimer mt-16">
      Educational demo for scam-awareness research. No real money, no real
      accounts, no real rewards.
    </div>
  </template>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    UI.renderShell("Transaction History");

    function statusBadge(s) {
      const map = {
        Completed: "badge-success",
        Pending:   "badge-warning",
        Rejected:  "badge-danger",
        Frozen:    "badge-danger",
      };
      return `<span class="badge ${map[s] || "badge-muted"}">${s}</span>`;
    }

    function render(filter) {
      const tbody = document.getElementById("txRows");
      tbody.innerHTML = "";
      const rows = DEMO.transactions.filter(t =>
        filter === "All" ? true : t.type === filter
      );
      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="5" class="muted center">No demo records yet — complete a task or buy a package to populate this list.</td></tr>`;
        return;
      }
      rows.forEach(t => {
        const tr = document.createElement("tr");
        const sign = t.amount >= 0 ? "+" : "-";
        const cls = t.amount >= 0 ? "badge-success" : "badge-warning";
        tr.innerHTML = `
          <td>${t.date}</td>
          <td>${t.type}</td>
          <td><span class="badge ${cls}">${sign}$${Math.abs(t.amount).toFixed(2)}</span></td>
          <td>${statusBadge(t.status)}</td>
          <td class="muted">${t.desc}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        render(btn.dataset.filter);
      });
    });

    render("All");
  </script>
</body>
</html>
