<!--
  Messages / Notifications - T-Video Media Demo
  Educational only. Fake announcements illustrate urgency tactics.
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Messages · T-Video Media Demo</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div id="appRoot"></div>

  <template id="pageContent">
    <h1 class="page-title">Messages & notifications</h1>

    <div class="notice">
      <strong>Educational note:</strong> Fake reward platforms often use
      notifications to create urgency and pressure - "limited-time" VIP
      promotions, fake withdrawal alerts, and fake "verification" requirements
      designed to push you into depositing more.
    </div>

    <div class="grid" id="msgList"></div>

    <div class="disclaimer mt-16">
      Educational demo for scam-awareness research. No real money, no real
      accounts, no real rewards.
    </div>
  </template>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    UI.renderShell("Messages");

    const tagCls = {
      Promo:  "badge-success",
      VIP:    "badge-gold",
      System: "badge-muted",
      Invite: "badge",
      Alert:  "badge-danger",
    };

    const list = document.getElementById("msgList");
    DEMO.messages.forEach(m => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="row-flex space-between">
          <div class="row-flex">
            <span class="badge ${tagCls[m.tag] || ""}">${m.tag}</span>
            <strong>${m.title}</strong>
          </div>
          <span class="muted" style="font-size:12px;">${m.date}</span>
        </div>
        <div class="muted mt-8" style="font-size:14px;">${m.body}</div>
      `;
      list.appendChild(card);
    });
  </script>
</body>
</html>
