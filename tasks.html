<!--
  Video Tasks - T-Video Media Demo

  - Locked behind package selection (VIP page).
  - Task slot count = vip.daily.
  - Reward per task = vip.dailyIncome / vip.daily.
  - Tasks reset every calendar day (local timezone).
  - Real <video> playback from assets/videos/task-N.mp4 (with .webm
    sibling fallback). The Complete Task button is disabled until the
    user actually finishes watching - we track playback time and refuse
    to count seek-aheads as "watched".
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Video tasks · T-Video Media Demo</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div id="appRoot"></div>

  <template id="pageContent">
    <h1 class="page-title">Video tasks</h1>

    <!-- Status strip -->
    <div class="grid grid-4 mb-16" id="statStrip">
      <div class="stat"><div class="label">Active package</div><div class="value" id="sPkg">—</div></div>
      <div class="stat"><div class="label">Tasks today</div><div class="value" id="sToday">0 / 0</div></div>
      <div class="stat"><div class="label">Reward per task</div><div class="value" id="sReward">$0.00</div></div>
      <div class="stat"><div class="label">Today's earnings</div><div class="value" id="sEarn">$0.00</div></div>
    </div>

    <!-- Locked state -->
    <div id="locked" class="hidden">
      <div class="lock-card">
        <div class="lock-icon">🔒</div>
        <h2>No package selected</h2>
        <p class="sub">
          Buy a package to unlock daily video tasks. Each package decides
          how many tasks you get per day and how much each one pays.
        </p>
        <a class="btn btn-primary" href="vip.html">Buy a package</a>
        <a class="btn" href="scam-analysis.html" style="margin-left:8px;">Why this matters</a>
      </div>
    </div>

    <!-- Active state -->
    <div id="active" class="hidden">
      <div class="notice">
        <strong>Educational warning:</strong> real scam sites use fake video
        tasks to make users believe they are earning money. The "rewards"
        are just numbers in your browser's localStorage — which is exactly
        how a real scam version of this page would behave on the
        operator's side.
      </div>

      <div class="grid grid-3" id="taskGrid"></div>
    </div>

    <div class="disclaimer mt-16">
      Educational demo for scam-awareness research. No real money, no real
      accounts, no real rewards.
    </div>
  </template>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    UI.renderShell("Video tasks");

    const grid    = document.getElementById("taskGrid");
    const lockEl  = document.getElementById("locked");
    const aliveEl = document.getElementById("active");

    function refresh() {
      const v = DEMO.api.getActiveVip();
      const u = DEMO.user;

      document.getElementById("sPkg").textContent    = v ? v.name : "None";
      document.getElementById("sReward").textContent = "$" + DEMO.api.rewardPerTask().toFixed(2);
      document.getElementById("sEarn").textContent   = "$" + u.todayEarnings.toFixed(2);

      if (!v) {
        lockEl.classList.remove("hidden");
        aliveEl.classList.add("hidden");
        document.getElementById("sToday").textContent = "0 / 0";
        return;
      }
      lockEl.classList.add("hidden");
      aliveEl.classList.remove("hidden");

      const tasks = DEMO.api.generateDailyTasks();
      const done  = tasks.filter(t => t.completed).length;
      document.getElementById("sToday").textContent = `${done} / ${tasks.length}`;

      grid.innerHTML = "";
      tasks.forEach(t => {
        const card = document.createElement("div");
        card.className = "card video-card";
        const badge = t.completed
          ? '<span class="badge badge-muted">Completed</span>'
          : '<span class="badge badge-success">Available</span>';
        card.innerHTML = `
          <div class="video-thumb">▶</div>
          <div class="video-meta">
            <h4>${t.title}</h4>
            <div class="row-flex space-between">
              <span class="reward-pill">+$${t.reward.toFixed(2)}</span>
              ${badge}
            </div>
            <div class="row-flex mt-8">
              <button class="btn btn-primary btn-sm watch-btn"
                      data-id="${t.id}" data-src="${t.videoSrc}" data-reward="${t.reward}"
                      ${t.completed ? "disabled style='opacity:.6;cursor:not-allowed;'" : ""}>
                ${t.completed ? "Done for today" : "Watch & earn"}
              </button>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });

      grid.querySelectorAll(".watch-btn").forEach(btn => {
        btn.addEventListener("click", () =>
          openWatch(btn.dataset.id, btn.dataset.src, parseFloat(btn.dataset.reward))
        );
      });
    }

    function openWatch(id, src, reward) {
      const fallbackId  = "fbCountdown_" + id;
      const fallbackBar = "fbBar_" + id;
      const videoElId   = "vid_" + id;

      const html = `
        <div id="loading_${id}" class="muted" style="font-size:13px;margin-bottom:8px;">
          Loading video…
        </div>
        <video id="${videoElId}" class="task-video hidden" controls playsinline preload="auto">
          <source src="${src}" type="video/mp4" />
          <source src="${src.replace(/\\.mp4$/, ".webm")}" type="video/webm" />
        </video>

        <div id="fb_${id}" class="hidden">
          <div class="video-fallback">▶</div>
          <div class="muted mt-8" style="font-size:13px;">
            No video file found at <code>${src}</code>. Drop a clip with
            that exact name into the <code>assets/videos/</code> folder
            to enable real playback. For now, the demo is using a 5-second
            countdown so the task can still be completed.
          </div>
          <div class="mt-8" style="font-weight:700;">
            Demo countdown: <span id="${fallbackId}">5</span>s
          </div>
          <div class="progress mt-8"><span id="${fallbackBar}" style="width:0%;"></span></div>
        </div>

        <div class="muted mt-8" style="font-size:12px;" id="watchHint_${id}">
          Watch the video to the end. Skipping ahead with the seek bar will
          not count.
        </div>

        <div class="notice mt-16" style="margin-bottom:0;">
          Reward on completion: <strong>+$${reward.toFixed(2)}</strong>
        </div>
      `;

      UI.openModal("Daily task — " + id, html, {
        confirmText: "Complete task",
        onConfirm: () => onComplete(id, reward),
      });

      const confirmBtn = document.getElementById("modalConfirm");
      const enable = () => {
        confirmBtn.disabled = false;
        confirmBtn.style.opacity = 1;
      };
      const disable = () => {
        confirmBtn.disabled = true;
        confirmBtn.style.opacity = .5;
      };
      disable();

      const v = document.getElementById(videoElId);
      let usedFallback = false;
      let watchedSeconds = 0;
      let lastTime = 0;
      let unlockedByPlayback = false;

      const useFallback = () => {
        if (usedFallback) return;
        usedFallback = true;
        document.getElementById("loading_" + id).classList.add("hidden");
        v.classList.add("hidden");
        document.getElementById("watchHint_" + id).textContent =
          "Demo timer running — the Complete button will enable when it finishes.";
        const fb = document.getElementById("fb_" + id);
        fb.classList.remove("hidden");
        let s = 5;
        const total = 5;
        const tick = setInterval(() => {
          s--;
          const pct = Math.round(((total - s) / total) * 100);
          const cd = document.getElementById(fallbackId);
          const bar = document.getElementById(fallbackBar);
          if (cd)  cd.textContent = Math.max(0, s);
          if (bar) bar.style.width = pct + "%";
          if (s <= 0) { clearInterval(tick); enable(); }
        }, 1000);
      };

      // Track real playback time so we can refuse seek-aheads.
      v.addEventListener("loadedmetadata", () => {
        document.getElementById("loading_" + id).classList.add("hidden");
        v.classList.remove("hidden");
      });
      v.addEventListener("timeupdate", () => {
        const dt = v.currentTime - lastTime;
        // Only count forward steps of <= 1 second as actual playback.
        if (dt > 0 && dt <= 1.05) watchedSeconds += dt;
        lastTime = v.currentTime;

        if (!unlockedByPlayback && v.duration && watchedSeconds / v.duration >= 0.9) {
          unlockedByPlayback = true;
          enable();
        }
      });
      v.addEventListener("ended", () => {
        // Fallback unlock: if the video finished but the watch ratio was
        // tight (some browsers fire timeupdate sparingly), still allow it.
        if (!unlockedByPlayback) enable();
      });
      v.addEventListener("seeking", () => {
        // Seeking doesn't count, but we don't punish the user either.
      });

      // If the file 404s or otherwise can't load, switch to fallback.
      v.addEventListener("error", useFallback, true);
      v.querySelectorAll("source").forEach(s =>
        s.addEventListener("error", () => {
          setTimeout(() => { if (v.networkState === 3 || v.error) useFallback(); }, 50);
        })
      );
      // If after 1500ms there's still no metadata, treat as missing.
      setTimeout(() => {
        if (v.readyState === 0) useFallback();
      }, 1500);
    }

    function onComplete(id, reward) {
      const r = DEMO.api.completeTask(id, reward);
      if (!r.ok) { UI.toast(r.error || "Could not complete"); return; }
      UI.toast(`+$${reward.toFixed(2)} added to your demo balance`);
      refresh();
    }

    refresh();
  </script>
</body>
</html>
