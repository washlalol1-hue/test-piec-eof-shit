<!--
  Settings - T-Video Media Demo
  Educational only. Changes are stored in localStorage to keep the
  demo feeling responsive, but nothing is sent to a backend.
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Settings · T-Video Media Demo</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div id="appRoot"></div>

  <template id="pageContent">
    <h1 class="page-title">Settings (Demo)</h1>

    <div class="grid grid-2 mb-16">
      <!-- Profile -->
      <div class="card">
        <h3 class="mt-0">Profile information</h3>
        <form id="profileForm" autocomplete="off" novalidate>
          <div class="field">
            <label>Username</label>
            <input class="input" id="s_username" />
          </div>
          <div class="field">
            <label>Email or phone</label>
            <input class="input" id="s_email" />
          </div>
          <button type="submit" class="btn btn-primary">Save (Demo)</button>
        </form>
      </div>

      <!-- Password / withdrawal password -->
      <div class="card">
        <h3 class="mt-0">Security (Demo)</h3>
        <form id="pwForm" autocomplete="off" novalidate>
          <div class="field">
            <label>Current password</label>
            <input class="input" type="password" placeholder="Any text - not validated" />
          </div>
          <div class="field">
            <label>New password</label>
            <input class="input" type="password" placeholder="Any text - not validated" />
          </div>
          <div class="field">
            <label>New withdrawal password</label>
            <input class="input" type="password" placeholder="Any text - not validated" />
          </div>
          <button type="submit" class="btn btn-primary">Update (Demo)</button>
        </form>
      </div>
    </div>

    <div class="grid grid-2 mb-16">
      <!-- Preferences -->
      <div class="card">
        <h3 class="mt-0">Preferences</h3>
        <div class="field">
          <label>Language</label>
          <select id="s_lang">
            <option>English</option>
            <option>Spanish</option>
            <option>French</option>
            <option>German</option>
            <option>Portuguese</option>
            <option>Hindi</option>
            <option>Indonesian</option>
          </select>
        </div>
        <div class="field">
          <label>Theme</label>
          <select id="s_theme">
            <option value="dark">Dark (default)</option>
            <option value="darker">Deep dark</option>
          </select>
        </div>
        <button class="btn btn-primary" id="prefBtn">Apply (Demo)</button>
      </div>

      <!-- Notifications -->
      <div class="card">
        <h3 class="mt-0">Notifications</h3>
        <label class="row-flex" style="justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);">
          <span>Task reminders</span>
          <input type="checkbox" checked />
        </label>
        <label class="row-flex" style="justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);">
          <span>VIP upgrade promotions</span>
          <input type="checkbox" checked />
        </label>
        <label class="row-flex" style="justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);">
          <span>Withdrawal updates</span>
          <input type="checkbox" checked />
        </label>
        <label class="row-flex" style="justify-content:space-between;padding:8px 0;">
          <span>Referral activity</span>
          <input type="checkbox" />
        </label>
      </div>
    </div>

    <div class="card">
      <h3 class="mt-0">Demo data</h3>
      <p class="muted" style="font-size:14px;">
        Reset the local demo state (balance, completed tasks, withdrawal
        history). Useful for school presentations - it lets you reset the
        site to its starting numbers between demos.
      </p>
      <div class="row-flex">
        <button class="btn btn-warning" id="resetBtn">Reset demo data</button>
        <a class="btn btn-danger" href="index.html" id="logoutBtn">Logout (return to landing)</a>
      </div>
    </div>

    <div class="disclaimer mt-16">
      Educational demo for scam-awareness research. No real money, no real
      accounts, no real rewards. All settings here are local-only and never
      sent to a backend.
    </div>
  </template>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    UI.renderShell("Settings");

    document.getElementById("s_username").value = DEMO.user.username;
    document.getElementById("s_email").value = DEMO.user.email;

    document.getElementById("profileForm").addEventListener("submit", (e) => {
      e.preventDefault();
      DEMO.user.username = document.getElementById("s_username").value || DEMO.user.username;
      DEMO.user.email = document.getElementById("s_email").value || DEMO.user.email;
      DEMO.user.avatar = DEMO.user.username.slice(0,2).toUpperCase();
      DEMO.saveUser(DEMO.user);
      UI.toast("Profile saved (demo only)");
    });

    document.getElementById("pwForm").addEventListener("submit", (e) => {
      e.preventDefault();
      UI.openModal("Password update (demo)",
        "<p>Demo only. No password is stored or validated.</p>",
        { confirmText: "OK" });
    });

    document.getElementById("prefBtn").addEventListener("click", () => {
      UI.toast("Preferences applied (demo only)");
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      UI.openModal(
        "Reset demo data?",
        "<p>This clears the local demo state (balance, tasks, withdrawals). " +
        "It does not contact any backend - there is no backend.</p>",
        { confirmText: "Reset",
          onConfirm: () => { DEMO.resetUser(); location.reload(); } }
      );
    });
  </script>
</body>
</html>
