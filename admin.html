<!--
  Admin Demo - T-Video Media Demo

  Imagined operator-facing dashboard. Locked behind a demo password gate
  to illustrate access control. The unlock state lives in memory only
  (cleared on page reload, logout, or browser close) - intentional, so
  it doesn't leak into normal demo navigation.

  Educational note: real admin systems check authorization on the
  SERVER. A purely client-side gate like this is not a real security
  boundary - anyone could read the source. We mention this on the page.
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin demo · T-Video Media Demo</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div id="appRoot"></div>

  <template id="pageContent">
    <h1 class="page-title">Admin demo</h1>

    <!-- Locked state -->
    <div id="locked" class="hidden">
      <div class="lock-card">
        <div class="lock-icon">🔒</div>
        <h2>Admin access required</h2>
        <p class="sub">
          This page is hidden from the sidebar by default. Enter the demo
          admin password to unlock it for this session.
        </p>
        <form id="gateForm" autocomplete="off" novalidate>
          <div class="field">
            <input class="input" id="gatePw" type="password" placeholder="demo-admin" autofocus />
          </div>
          <button class="btn btn-primary btn-block" type="submit">Unlock admin</button>
          <div class="err" id="gateErr"></div>
        </form>
        <hr class="sep" />
        <div class="muted" style="font-size:12px;">
          Educational note: the password is shown intentionally —
          <code>demo-admin</code>. Real admin systems verify access on
          the server. A client-side gate alone is not real security.
        </div>
      </div>
    </div>

    <!-- Unlocked content -->
    <div id="unlocked" class="hidden">
      <div class="row-flex space-between mb-16">
        <div class="row-flex">
          <span class="badge badge-success">Admin unlocked</span>
          <span class="muted" style="font-size:13px;">This session only</span>
        </div>
        <button class="btn" id="lockBtn">Lock admin</button>
      </div>

      <div class="notice danger">
        <strong>Educational note:</strong> what you're about to see is what
        an operator-facing dashboard of a scam reward platform might look
        like. The numbers are fake. Real cases would let operators directly
        edit user balances, freeze withdrawals, and tune the "earn rate" —
        which is exactly why these platforms can never be trusted.
      </div>

      <!-- Top stats -->
      <div class="grid grid-4 mb-16">
        <div class="stat"><div class="label">Total demo users</div><div class="value" id="aTotalUsers">0</div></div>
        <div class="stat"><div class="label">Total fake deposits</div><div class="value" id="aDeposits">$0</div></div>
        <div class="stat"><div class="label">Total fake withdrawals</div><div class="value" id="aWithdraws">$0</div></div>
        <div class="stat"><div class="label">Pending withdrawals</div><div class="value" id="aPending">0</div></div>
      </div>

      <div class="grid grid-2 mb-16">
        <div class="card">
          <h3 class="mt-0">VIP distribution</h3>
          <div class="row-flex" style="align-items:flex-start;gap:24px;">
            <div class="donut" id="donut" style="--p:48;"><span id="donutLbl">VIP 0+1</span></div>
            <div style="flex:1;" id="vipLegend"></div>
          </div>
        </div>

        <div class="card">
          <h3 class="mt-0">Weekly task completions</h3>
          <div class="bars" id="bars"></div>
          <div class="muted mt-16" style="font-size:12px;">Mon · Tue · Wed · Thu · Fri · Sat · Sun</div>
        </div>
      </div>

      <div class="card mb-16">
        <h3 class="mt-0">Referral network overview</h3>
        <div class="grid grid-3">
          <div>
            <div class="muted">Direct invites (L1)</div>
            <div style="font-size:22px;font-weight:800;color:var(--primary);">3,142</div>
          </div>
          <div>
            <div class="muted">Second tier (L2)</div>
            <div style="font-size:22px;font-weight:800;color:var(--primary);">7,910</div>
          </div>
          <div>
            <div class="muted">Third tier (L3)</div>
            <div style="font-size:22px;font-weight:800;color:var(--primary);">12,348</div>
          </div>
        </div>
        <p class="muted" style="font-size:13px;margin-top:12px;">
          Educational note: these dramatic ratios are typical of pyramid-style
          platforms — a small number of "top" recruiters generate most of the
          downline.
        </p>
      </div>

      <div class="card mb-16">
        <h3 class="mt-0">User management</h3>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>ID</th><th>Username</th><th>VIP</th><th>Balance</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody id="userRows"></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h3 class="mt-0">Withdrawal review queue</h3>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Ticket</th><th>User</th><th>Amount</th><th>Address</th><th>Date</th><th>Action</th></tr>
            </thead>
            <tbody id="reviewRows"></tbody>
          </table>
        </div>
      </div>

      <div class="disclaimer mt-16">
        Educational demo for scam-awareness research. No real money, no real
        accounts, no real rewards. Admin actions below are simulated.
      </div>
    </div>
  </template>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    UI.renderShell("Admin");

    function showLocked() {
      document.getElementById("locked").classList.remove("hidden");
      document.getElementById("unlocked").classList.add("hidden");
    }
    function showUnlocked() {
      document.getElementById("locked").classList.add("hidden");
      document.getElementById("unlocked").classList.remove("hidden");
      renderAdmin();
    }

    document.getElementById("gateForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const pw = document.getElementById("gatePw").value;
      const r = DEMO.api.unlockAdmin(pw);
      if (!r.ok) {
        const err = document.getElementById("gateErr");
        err.textContent = r.error;
        return;
      }
      // Reload so the sidebar regenerates with the Admin link visible.
      location.reload();
    });

    function renderAdmin() {
      const A = DEMO.admin;
      document.getElementById("aTotalUsers").textContent = A.totalUsers.toLocaleString();
      document.getElementById("aDeposits").textContent   = "$" + A.totalDeposits.toLocaleString();
      document.getElementById("aWithdraws").textContent  = "$" + A.totalWithdrawals.toLocaleString();
      document.getElementById("aPending").textContent    = A.pendingWithdrawals.toLocaleString();

      const top2 = A.vipDistribution[0].pct + A.vipDistribution[1].pct;
      document.getElementById("donut").style.setProperty("--p", top2);
      document.getElementById("donutLbl").textContent = top2 + "%";

      const legend = document.getElementById("vipLegend");
      legend.innerHTML = "";
      A.vipDistribution.forEach(v => {
        const row = document.createElement("div");
        row.style.cssText = "display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed var(--line);font-size:13px;";
        row.innerHTML = `<span>${v.level}</span><span class="muted">${v.pct}%</span>`;
        legend.appendChild(row);
      });

      const bars = document.getElementById("bars");
      bars.innerHTML = "";
      const max = Math.max(...A.weeklyTasks);
      const labels = ["M", "T", "W", "T", "F", "S", "S"];
      A.weeklyTasks.forEach((v, i) => {
        const b = document.createElement("div");
        b.className = "bar";
        b.style.height = (v / max * 100) + "%";
        b.dataset.label = labels[i];
        b.title = v + " demo tasks";
        bars.appendChild(b);
      });

      const userRows = document.getElementById("userRows");
      userRows.innerHTML = "";
      A.users.forEach(u => {
        const cls = u.status === "Active" ? "badge-success" :
                    u.status === "Suspended" ? "badge-danger" : "badge-muted";
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>#${u.id}</td>
          <td>${u.username}</td>
          <td><span class="badge badge-gold">VIP ${u.vip}</span></td>
          <td>$${u.balance.toFixed(2)}</td>
          <td><span class="badge ${cls}">${u.status}</span></td>
          <td>
            <button class="btn btn-sm" data-act="view" data-u="${u.username}">View</button>
            <button class="btn btn-sm btn-warning" data-act="freeze" data-u="${u.username}">Freeze</button>
          </td>
        `;
        userRows.appendChild(tr);
      });
      userRows.addEventListener("click", (e) => {
        const b = e.target.closest("button[data-act]");
        if (!b) return;
        UI.openModal(
          "Demo admin action",
          `<p>Action <strong>${b.dataset.act}</strong> on user
           <strong>${b.dataset.u}</strong> is simulated.</p>
           <p class="muted" style="font-size:13px;">Educational note: in
           real scam platforms, operator-side controls like these are
           exactly how user balances and withdrawals get manipulated.</p>`,
          { confirmText: "OK" }
        );
      });

      const reviewRows = document.getElementById("reviewRows");
      reviewRows.innerHTML = "";
      A.pendingReview.forEach(r => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${r.id}</td>
          <td>${r.username}</td>
          <td>$${r.amount.toFixed(2)}</td>
          <td><code>${r.address}</code></td>
          <td>${r.date}</td>
          <td>
            <button class="btn btn-sm btn-primary" data-act="approve" data-id="${r.id}">Approve</button>
            <button class="btn btn-sm btn-danger" data-act="reject" data-id="${r.id}">Reject</button>
          </td>
        `;
        reviewRows.appendChild(tr);
      });
      reviewRows.addEventListener("click", (e) => {
        const b = e.target.closest("button[data-act]");
        if (!b) return;
        UI.openModal(
          "Demo review action",
          `<p>${b.dataset.act === "approve" ? "Approval" : "Rejection"} of
           ticket <strong>${b.dataset.id}</strong> is simulated. No real
           money moves.</p>`,
          { confirmText: "OK" }
        );
      });
    }

    document.getElementById("lockBtn").addEventListener("click", () => {
      DEMO.api.lockAdmin();
      location.reload();
    });

    if (DEMO.isAdmin) showUnlocked(); else showLocked();
  </script>
</body>
</html>
